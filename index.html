<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>radibadical</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 3rem;
    }

    .site-title {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 480px;
    }
    .title-rule { flex: 1; height: 1px; background: #2d5a8e; }
    .title-text { text-align: center; flex-shrink: 0; }
    .title-byline {
      font-size: 0.7rem;
      font-weight: 600;
      color: #a07820;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .title-main {
      font-size: 1.5rem;
      font-weight: 700;
      color: #8b949e;
      letter-spacing: 2px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 360px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 1.75rem 1rem;
      background: #161b22;
      border: 1px solid #21262d;
      border-top-width: 2px;
      border-radius: 6px;
      text-decoration: none;
      color: #8b949e;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .card:hover { background: #1c2128; color: #e6edf3; }

    .card-movies  { border-top-color: #d4a017; }
    .card-music   { border-top-color: #1db954; }
    .card-twitch  { border-top-color: #9146ff; }

    .card-movies:hover  { border-color: #d4a017; border-top-width: 2px; }
    .card-music:hover   { border-color: #1db954; border-top-width: 2px; }
    .card-twitch:hover  { border-color: #9146ff; border-top-width: 2px; }

    .card svg { width: 28px; height: 28px; fill: currentColor; }
    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 320px) {
      .cards { grid-template-columns: 1fr; max-width: 180px; }
    }
  </style>
</head>
<body>

  <div class="site-title">
    <span class="title-rule"></span>
    <div class="title-text">
      <div class="title-main">RADIBADICAL</div>
    </div>
    <span class="title-rule"></span>
  </div>

  <div class="cards">
    <a class="card card-movies" href="/movies/">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 4H6C4.34 4 3 5.34 3 7v10c0 1.66 1.34 3 3 3h12c1.66 0 3-1.34 3-3V7c0-1.66-1.34-3-3-3zM7 17H5v-2h2v2zm0-4H5v-2h2v2zm0-4H5V7h2v2zm4 8H9V7h2v10zm4 0h-2V7h2v10zm4 4h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/>
      </svg>
      <span class="card-label">Movies</span>
    </a>

    <a class="card card-music" href="/spotify/">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 01-.277-1.215c3.809-.87 7.077-.496 9.712 1.115a.623.623 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.453-1.492c3.633-1.102 8.147-.568 11.233 1.329a.78.78 0 01.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 11-.543-1.793c3.532-1.072 9.404-.865 13.115 1.338a.937.937 0 01-.955 1.612z"/>
      </svg>
      <span class="card-label">Music</span>
    </a>

  </div>

</body>
</html>
