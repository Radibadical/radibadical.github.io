<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music — radibadical</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #21262d;
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .back {
      color: #8b949e;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .back:hover { color: #e6edf3; }

    .site-title {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex: 1;
    }
    .title-rule { flex: 1; height: 1px; background: #2d5a8e; }
    .title-text { text-align: center; flex-shrink: 0; }
    .title-byline {
      font-size: 0.65rem;
      font-weight: 600;
      color: #a07820;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .title-main {
      font-size: 1.1rem;
      font-weight: 700;
      color: #8b949e;
      letter-spacing: 2px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    iframe {
      width: 100%;
      border-radius: 12px;
      border: none;
      display: block;
    }

    @media (max-width: 600px) {
      main { padding: 1rem; }
      header { padding: 1rem; }
    }
  </style>
</head>

        <div class="title-main">RADIBADICAL</div>

</header>
